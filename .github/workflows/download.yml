name: Download Questions

on:
  workflow_dispatch:      # run manually from GitHub Actions tab
  schedule:
    - cron: "0 0 * * *"  # also auto-runs daily at midnight UTC

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # just under GitHub's 6-hour free limit

    permissions:
      contents: write     # allows git push back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # full history so rebase works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write accounts.json from secret
        run: echo '${{ secrets.ACCOUNTS_JSON }}' > accounts.json

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Run downloader (commits every round automatically)
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_BRANCH: master
        run: python download.py
